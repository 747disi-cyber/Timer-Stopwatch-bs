<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Простой таймер</title>
  <noscript>
    <meta http-equiv="refresh" content="0;URL=no-js.html" />
  </noscript>
  <style>
    :root {
      --bg: linear-gradient(135deg, #4f8bf5 0%, #2f4c7d 100%);
      --text: #fff;
      --card-bg: rgba(255,255,255,0.08);
      --button-start: #42d37f;
      --button-start-text: #0b2d18;
      --button-pause: #ffd166;
      --button-pause-text: #3d2e00;
      --button-reset: #ff6b6b;
      --button-reset-text: #3d0202;
      --input-bg: rgba(255,255,255,0.12);
      --input-text: #fff;
      --select-text: #111;
      --input-border: rgba(255,255,255,0.25);
      --small-text: rgba(255,255,255,0.8);
    }
    .theme-dark {
      --bg: linear-gradient(135deg, #14161f 0%, #202433 100%);
      --text: #e8ecff;
      --card-bg: rgba(255,255,255,0.08);
      --button-start: #53c17a;
      --button-start-text: #0a1d11;
      --button-pause: #f5d06b;
      --button-pause-text: #2e2600;
      --button-reset: #ff7a7a;
      --button-reset-text: #2e0000;
      --input-bg: rgba(255,255,255,0.08);
      --input-text: #e8ecff;
      --select-text: #fff;
      --input-border: rgba(255,255,255,0.2);
    }
    .theme-light {
      --bg: linear-gradient(135deg, #eef4ff 0%, #d6e2ff 100%);
      --text: #1f2240;
      --card-bg: rgba(255,255,255,0.95);
      --button-start: #3f8f50;
      --button-start-text: #ffffff;
      --button-pause: #f5b74e;
      --button-pause-text: #1f1b00;
      --button-reset: #f15d5d;
      --button-reset-text: #ffffff;
      --input-bg: #f5f8ff;
      --input-text: #1f2240;
      --select-text: #111;
      --input-border: #cfd7ed;
    }
    .theme-cyberpunk {
      --bg: radial-gradient(circle at top, #6efff8 0%, #0d1120 40%, #120827 100%);
      --text: #f7f7ff;
      --card-bg: rgba(8, 8, 25, 0.82);
      --button-start: #ff3eff;
      --button-start-text: #0a002d;
      --button-pause: #00f5ff;
      --button-pause-text: #071a2b;
      --button-reset: #ff005a;
      --button-reset-text: #fff;
      --input-bg: rgba(14, 14, 43, 0.75);
      --input-text: #f7f7ff;
      --select-text: #f7f7ff;
      --input-border: rgba(127, 0, 255, 0.55);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }
    .timer-card {
      width: min(420px, 90vw);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      text-align: center;
      transition: background 0.3s ease;
    }
    .timer-card h1 {
      margin: 0 0 16px;
      font-size: 1.75rem;
    }
    .display {
      font-size: 4rem;
      letter-spacing: 0.08em;
      margin: 24px 0;
      font-weight: 700;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    button {
      min-width: 110px;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .start {
      background: var(--button-start);
      color: var(--button-start-text);
    }
    .pause {
      background: var(--button-pause);
      color: var(--button-pause-text);
    }
    .reset {
      background: var(--button-reset);
      color: var(--button-reset-text);
    }
    .settings {
      margin-top: 24px;
      display: grid;
      gap: 14px;
      text-align: left;
    }
    .settings label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }
    .settings .select-wrapper {
      position: relative;
      min-width: 150px;
    }
    .settings input,
    .settings select {
      min-width: 80px;
      border-radius: 999px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--input-text);
      padding: 10px 12px;
      text-align: center;
    }
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
      pointer-events: none;
    }
    .toast {
      min-width: 240px;
      max-width: 340px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 80, 80, 0.97);
      color: #fff;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: translateY(-12px);
      animation: toastIn 0.25s forwards;
      pointer-events: none;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .toast.hide {
      animation: toastOut 0.3s forwards;
    }
    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-18px);
      }
    }
    .settings select {
      min-width: 150px;
      padding-right: 36px;
      color: var(--select-text);
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    .settings .select-arrow {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.95rem;
      color: var(--select-text);
      transition: transform 0.2s ease;
    }
    .settings .select-wrapper.open .select-arrow {
      transform: translateY(-50%) rotate(90deg);
    }
    .settings select option {
      color: var(--select-text);
      background: var(--input-bg);
    }
    .theme-dark .settings select option {
      color: #111;
    }
    .settings input:focus,
    .settings select:focus {
      outline: 2px solid rgba(255,255,255,0.55);
    }
    small {
      display: block;
      margin-top: 8px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="timer-card">
    <h1>Простой таймер</h1>
    <div class="display" id="timeDisplay">05:00</div>
    <div class="controls">
      <button class="start" id="startBtn">Старт</button>
      <button class="pause" id="pauseBtn">Пауза</button>
      <button class="reset" id="resetBtn">Сброс</button>
    </div>
    <div class="settings">
      <label>
        Часы
        <input id="hoursInput" type="number" min="0" max="24" value="0" />
      </label>
      <label>
        Минуты
        <input id="minutesInput" type="number" min="0" max="60" value="5" />
      </label>
      <label>
        Секунды
        <input id="secondsInput" type="number" min="0" max="60" value="0" />
      </label>
      <label>
        Тема
        <div class="select-wrapper">
          <select id="themeSelect">
            <option value="default">По умолчанию</option>
            <option value="dark">Тёмная</option>
            <option value="light">Светлая</option>
            <option value="cyberpunk">Киберпанк</option>
          </select>
          <span class="select-arrow">▼</span>
        </div>
      </label>
      <label>
        Язык/Language
        <div class="select-wrapper">
          <select id="languageSelect">
            <option value="ru" selected>Русский</option>
            <option value="en">English</option>
          </select>
          <span class="select-arrow">▼</span>
        </div>
      </label>
      <small>Нажмите «Сброс», чтобы применить новое время.</small>
    </div>
  </main>
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const display = document.getElementById('timeDisplay');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const hoursInput = document.getElementById('hoursInput');
    const minutesInput = document.getElementById('minutesInput');
    const secondsInput = document.getElementById('secondsInput');

    let totalSeconds = getInitialSeconds();
    let intervalId = null;
    let isRunning = false;

    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      if (hours > 0) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }
      return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateDisplay() {
      display.textContent = formatTime(totalSeconds);
    }

    function startTimer() {
      if (isRunning) return;
      if (totalSeconds <= 0) return;
      isRunning = true;
      intervalId = setInterval(() => {
        totalSeconds -= 1;
        updateDisplay();
        if (totalSeconds <= 0) {
          clearInterval(intervalId);
          intervalId = null;
          isRunning = false;
          display.textContent = '00:00';
          playSound();
          document.body.style.background = 'linear-gradient(135deg, #ff6b6b 0%, #b02a2a 100%)';
          setTimeout(() => {
            document.body.style.background = '';
          }, 1200);
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
    }

    function playSound() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const audioCtx = new AudioContext();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.5);
    }

    const themeSelect = document.getElementById('themeSelect');
    const languageSelect = document.getElementById('languageSelect');
    const toastContainer = document.getElementById('toastContainer');
    const selectWrappers = document.querySelectorAll('.select-wrapper');

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      toastContainer.append(toast);

      const hideToast = () => toast.classList.add('hide');
      const removeToast = () => toast.remove();

      const hideTimer = window.setTimeout(hideToast, 3000);
      toast.addEventListener('animationend', (event) => {
        if (event.animationName === 'toastOut') {
          removeToast();
          window.clearTimeout(hideTimer);
        }
      });
    }

    function showLimitError(fieldName, limit) {
      showToast(`Значение должно быть от 0 до ${limit} ${fieldName}.`);
    }

    function validateFieldValue(field, max, label) {
      const rawValue = field.value.trim();
      if (rawValue === '') return null;
      const value = Number(rawValue);
      if (!Number.isFinite(value)) return null;
      if (value < 0) {
        showLimitError(label, max);
        return 0;
      }
      if (value > max) {
        showLimitError(label, max);
        return max;
      }
      return value;
    }

    function attachValidation(field, max, label) {
      field.addEventListener('input', () => {
        const rawValue = field.value.trim();
        const value = Number(rawValue);
        if (!Number.isFinite(value)) {
          delete field.dataset.errorShown;
          return;
        }
        if ((value < 0 || value > max) && !field.dataset.errorShown) {
          showLimitError(label, max);
          field.dataset.errorShown = '1';
        }
        if (value >= 0 && value <= max) {
          delete field.dataset.errorShown;
        }
      });

      field.addEventListener('blur', () => {
        const validated = validateFieldValue(field, max, label);
        if (validated !== null && Number(field.value) !== validated) {
          field.value = String(validated);
        }
        if (Number(field.value) <= max) {
          delete field.dataset.errorShown;
        }
      });
    }

    attachValidation(hoursInput, 24, 'часов');
    attachValidation(minutesInput, 60, 'минут');
    attachValidation(secondsInput, 60, 'секунд');

    function getInitialSeconds() {
      const hours = validateFieldValue(hoursInput, 24, 'часов') ?? Math.max(0, Number(hoursInput.value) || 0);
      const minutes = validateFieldValue(minutesInput, 60, 'минут') ?? Math.max(0, Number(minutesInput.value) || 0);
      const seconds = validateFieldValue(secondsInput, 60, 'секунд') ?? Math.max(0, Number(secondsInput.value) || 0);
      return hours * 3600 + minutes * 60 + seconds;
    }

    function applyTheme(theme) {
      document.body.classList.remove('theme-default', 'theme-dark', 'theme-light', 'theme-cyberpunk');
      document.body.classList.add(`theme-${theme}`);
      themeSelect.value = theme;
      localStorage.setItem('timerTheme', theme);
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('timerTheme') || 'default';
      applyTheme(savedTheme);
    }

    const selectWrapper = document.querySelector('.select-wrapper');

    selectWrappers.forEach((wrapper) => {
      const select = wrapper.querySelector('select');
      select.addEventListener('mousedown', () => {
        if (document.activeElement === select) {
          wrapper.classList.toggle('open');
        }
      });
      select.addEventListener('focus', () => wrapper.classList.add('open'));
      select.addEventListener('blur', () => wrapper.classList.remove('open'));
    });

    themeSelect.addEventListener('change', () => {
      applyTheme(themeSelect.value);
    });

    languageSelect.addEventListener('change', () => {
      if (languageSelect.value === 'en') {
        location.href = 'index-eng.html';
      }
    });

    document.addEventListener('click', (event) => {
      selectWrappers.forEach((wrapper) => {
        if (!wrapper.contains(event.target)) {
          wrapper.classList.remove('open');
        }
      });
    });

    function resetTimer() {
      pauseTimer();
      totalSeconds = getInitialSeconds();
      if (totalSeconds <= 0) {
        totalSeconds = 0;
      }
      updateDisplay();
    }

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);

    initTheme();
    updateDisplay();
  </script>
</body>
</html>
